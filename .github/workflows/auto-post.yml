name: Auto-Post to Social Media

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [post]

jobs:
  post-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Telegram
        run: |
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          HOOK1="وش رايك؟"
          HOOK2="هل سمعت عن هذا؟"
          HOOK3="والله تستاهل!"
          HOOKS=($HOOK1 $HOOK2 $HOOK3)
          HOOK=${HOOKS[$((RANDOM % 3))]}
          MSG="$HOOK

سوق البرمجيات السحابية في المملكة

https://saudisaashub.pages.dev/articles/saas-market-saudi-arabia-2026

#SaudiSaaS #السعودية #التقنية"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d "chat_id=${CHAT_ID}" -d "text=${MSG}"
