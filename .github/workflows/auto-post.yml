name: Auto-Post to Social Media

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [update-social]

jobs:
  post-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Post to Telegram
        run: |
          # Article to post
          ARTICLE_TITLE="سوق البرمجيات السحابية في المملكة — وين وصل وإلى وين رايح؟"
          ARTICLE_SLUG="saas-market-saudi-arabia-2026"
          ARTICLE_EXCERPT="يُتوقع أن يصل حجم سوق SaaS في المملكة إلى 6.49 مليار دولار بحلول عام 2030."
          SITE_URL="https://saudisaashub.pages.dev"
          
          # Telegram Bot Token
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          
          # Your chat ID
          CHAT_ID="7293624236"
          
          # Hooks
          HOOKS=("وش رايك؟ 🤔" "هل سمعت عن هذا؟ 🤨" "والله تستاهل تعرف! 🙌" "اقرى وأخبرني! 😱" "وش المثير في هذا؟ 🔥")
          HOOK=${HOOKS[$((RANDOM % 5))]}
          
          # Build message
          MESSAGE="${HOOK}

${ARTICLE_TITLE}

📝 ${ARTICLE_EXCERPT}

👇 اقرأ المزيد:
${SITE_URL}/articles/${ARTICLE_SLUG}

#SaudiSaaS #السعودية #التقنية #SaaS #Startups"
          
          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
          
          echo "✅ Posted to Telegram!"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
