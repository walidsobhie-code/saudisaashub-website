name: Auto-Post to Social Media

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Force post all articles'
        required: false
        type: boolean
        default: false

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests python-dateutil
      
      - name: Get latest articles
        id: articles
        run: |
          python3 << 'EOF'
          import json
          import os
          from datetime import datetime, timedelta
          
          # Read articles from the data file
          with open('lib/articles-data.ts', 'r', encoding='utf-8') as f:
            content = f.read()
          
          # Simple extraction (articles are in a JavaScript array)
          import re
          articles = re.findall(r'\{[^}]+"title":"([^"]+)"[^}]+"slug":"([^"]+)"[^}]+"excerpt":"([^"]+)"[^}]+\}', content)
          
          # Get latest 3 articles
          latest = []
          for i, (title, slug, excerpt) in enumerate(articles[:3]):
            latest.append({
              "title": title,
              "slug": slug,
              "excerpt": excerpt[:100] + "..." if len(excerpt) > 100 else excerpt,
              "categories": ["SaaS", "Tech"]
            })
          
          # Output as JSON
          with open('latest_articles.json', 'w') as f:
            json.dump(latest, f, ensure_ascii=False)
          
          print(f"Found {len(latest)} articles")
          EOF
      
      - name: Post to Telegram Channels
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import requests
          import random
          from datetime import datetime
          
          SITE_URL = "https://saudisaashub.pages.dev"
          BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          
          # Channel IDs (need to be configured)
          CHANNELS = {
            "instagram": os.environ.get("TG_INSTA_CHAT_ID", ""),
            "linkedin": os.environ.get("TG_LINKEDIN_CHAT_ID", ""),
            "twitter": os.environ.get("TG_TWITTER_CHAT_ID", ""),
          }
          
          SAUDI_HOOKS = [
              "وش رايك؟ 🤔",
              "هل سمعت عن هذا؟ 🤨",
              "والله تستاهل تعرف! 🙌",
              "اقرى وأخبرني! 😱",
              "وش المثير في هذا؟ 🔥",
              "هل تعرف شنو يعني هذا؟ 🧐",
              "والله موضوع مهم! 💡",
              "شفت مثل هذا من قبل؟ 👀",
          ]
          
          def get_hook(title):
              random.seed(hash(title))
              return "🎯 " + random.choice(SAUDI_HOOKS)
          
          def get_hashtags():
              return "#SaudiSaaS #السعودية #التقنية #Startups"
          
          def generate_post(article, platform):
              hook = get_hook(article['title'])
              url = f"{SITE_URL}/articles/{article['slug']}"
              hashtags = get_hashtags()
              
              if platform == "twitter":
                  return f"{hook}\n\n{article['title'][:80]}...\n\n🔗 {url}\n\n{hashtags}"
              elif platform == "linkedin":
                  return f"{hook}\n\n{article['title']}\n\n📝 {article['excerpt']}\n\n👇 اقرأ المزيد:\n{url}\n\n{hashtags}\n\n#SaudiSaaS #السعودية #ريادة_الأعمال"
              else:  # instagram
                  return f"✨ {hook.replace('🎯 ', '')}\n\n{article['title']}\n\n📖 {article['excerpt']}\n\n👆 رابط الحلقة في البايو!\n\n{hashtags}\n\n#saudisaas #السعودية #technology"
          
          def send_message(chat_id, text):
              if not chat_id or not BOT_TOKEN:
                  print(f"⚠️ Missing config for channel")
                  return False
              
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
              data = {
                  "chat_id": chat_id,
                  "text": text,
                  "parse_mode": "Markdown"
              }
              
              try:
                  response = requests.post(url, json=data, timeout=10)
                  if response.status_code == 200:
                      print(f"✅ Posted to {chat_id}")
                      return True
                  else:
                      print(f"❌ Error: {response.text}")
                      return False
              except Exception as e:
                  print(f"❌ Exception: {e}")
                  return False
          
          # Load articles
          with open('latest_articles.json', 'r', encoding='utf-8') as f:
              articles = json.load(f)
          
          print(f"📰 Processing {len(articles)} articles...")
          
          # Post each article to each channel
          for article in articles:
              print(f"\n📝 {article['title'][:40]}...")
              for platform, chat_id in CHANNELS.items():
                  post = generate_post(article, platform)
                  if chat_id:
                      send_message(chat_id, post)
          
          print("\n✅ Done!")
          EOF
        env:
          TG_INSTA_CHAT_ID: ${{ secrets.TG_INSTA_CHAT_ID }}
          TG_LINKEDIN_CHAT_ID: ${{ secrets.TG_LINKEDIN_CHAT_ID }}
          TG_TWITTER_CHAT_ID: ${{ secrets.TG_TWITTER_CHAT_ID }}
