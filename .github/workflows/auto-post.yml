name: Auto-Post to Social Media

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [post-article]

jobs:
  post-to-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Telegram
        run: |
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          SITE_URL="https://saudisaashub.pages.dev"
          
          HOOKS=("وش رايك؟ 🤔" "هل سمعت عن هذا؟ 🤨" "والله تستاهل! 🙌")
          HOOK=${HOOKS[$((RANDOM % 3))]}
          
          MESSAGE="${HOOK}

سوق البرمجيات السحابية في المملكة

يُتوقع ان يصل حجم سوق SaaS في المملكة الى 6.49 مليار دولار.

👇 ${SITE_URL}/articles/saas-market-saudi-arabia-2026

#SaudiSaaS #السعودية #التقنية"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
          
          echo "Done!"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
